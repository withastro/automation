name: Draft release

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  draft-release:
    if: github.repository == 'withastro/automation'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: release-drafter/release-drafter@73b95fa1c286dfd6802a4f949b07dad6149f2b0f # v7.5.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
