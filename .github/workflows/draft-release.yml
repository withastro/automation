name: Draft release

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  draft-release:
    if: github.repository == 'withastro/automation'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: release-drafter/release-drafter@c2e2804cc59f45f57076a99af580d0fedb697927 # v7.3.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
