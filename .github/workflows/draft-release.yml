name: Draft release

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  draft-release:
    if: github.repository == 'withastro/automation'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: release-drafter/release-drafter@693d20e7c1ce1a81d3a41962f85914253b518449 # v7.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
